<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لا يوجد اتصال - عين عُمان</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    h1 {
      font-size: 32px;
      margin-bottom: 15px;
      font-weight: bold;
    }
    
    p {
      font-size: 18px;
      margin: 10px 0;
      opacity: 0.9;
      line-height: 1.6;
    }
    
    .features {
      margin: 30px 0;
      text-align: right;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
    }
    
    .features h3 {
      font-size: 20px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .features ul {
      list-style: none;
      padding: 0;
    }
    
    .features li {
      padding: 8px 0;
      padding-right: 25px;
      position: relative;
    }
    
    .features li:before {
      content: '✓';
      position: absolute;
      right: 0;
      color: #4ade80;
      font-weight: bold;
    }
    
    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    
    button {
      background: white;
      color: #667eea;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .secondary {
      background: transparent;
      color: white;
      border: 2px solid white;
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>عذراً، لا يمكن الوصول إلى الخادم في الوقت الحالي</p>
    
    <div class="features">
      <h3>✨ ميزات متوفرة بدون إنترنت:</h3>
      <ul>
        <li>تصفح الصفحات المخزنة مسبقاً</li>
        <li>عرض العقارات التي قمت بزيارتها</li>
        <li>مراجعة بياناتك المحفوظة</li>
        <li>الإضافة للمفضلة (سيتم المزامنة لاحقاً)</li>
      </ul>
    </div>
    
    <div class="buttons">
      <button onclick="window.location.reload()">🔄 إعادة المحاولة</button>
      <button class="secondary" onclick="window.history.back()">← الرجوع</button>
    </div>
    
    <div class="status" id="status">
      جاري التحقق من الاتصال...
    </div>
  </div>
  
  <script>
    // فحص الاتصال تلقائياً
    function checkConnection() {
      const statusEl = document.getElementById('status');
      
      if (navigator.onLine) {
        statusEl.innerHTML = '✅ تم استعادة الاتصال! جاري إعادة التحميل...';
        statusEl.style.background = 'rgba(74, 222, 128, 0.3)';
        
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      } else {
        statusEl.innerHTML = '⚠️ لا يوجد اتصال بالإنترنت';
        statusEl.style.background = 'rgba(239, 68, 68, 0.3)';
      }
    }
    
    // فحص كل 3 ثواني
    setInterval(checkConnection, 3000);
    checkConnection();
    
    // فحص عند استعادة الاتصال
    window.addEventListener('online', () => {
      checkConnection();
    });
    
    window.addEventListener('offline', () => {
      checkConnection();
    });
  </script>
</body>
</html>
